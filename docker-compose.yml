networks:
  alumni-connect-network:
    driver: bridge

volumes:
  alumni_postgres_data:
    driver: local

services:
  db:
    image: postgres:16
    # env_file:
    #   - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /tmp/alumni_postgres_data:/var/lib/postgresql/data
    networks:
      - alumni-connect-network
    restart: unless-stopped

  backend:
    image: shobanchiddarth/alumni-connect-backend:0.0.2
    # env_file:
    #   - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - alumni-connect-network
    depends_on:
      - db
    restart: unless-stopped
